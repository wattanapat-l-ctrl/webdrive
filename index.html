<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Pro | Quick Preview Edition</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8; --bg: #ffffff; --side: #f1f3f4; --border: #dadce0;
            --text-main: #202124; --text-sub: #5f6368;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text-main); overflow: hidden; }

        /* Sidebar & Layout */
        .sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { padding: 12px 16px; border-radius: 24px; cursor: pointer; display: flex; align-items: center; gap: 14px; font-size: 14px; border: none; background: none; width: 100%; color: var(--text-sub); margin-bottom: 4px; }
        .nav-item.active { background: #e8f0fe; color: var(--primary); font-weight: 600; }

        /* Main Grid */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        .grid { flex: 1; padding: 24px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; align-content: start; }
        
        .card { background: white; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: 0.2s; overflow: hidden; display: flex; flex-direction: column; aspect-ratio: 4/3.5; }
        .card:hover { border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card.selected { background: #e8f0fe; border-color: var(--primary); }
        .preview-thumb { flex: 1; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border-bottom: 1px solid var(--border); overflow: hidden; }
        .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
        .info span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* QUICK PREVIEW MODAL (NEW!) */
        #preview-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; z-index: 70000; align-items: center; justify-content: center;
        }
        .modal-content {
            width: 85%; height: 85%; background: white; border-radius: 12px;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .modal-header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .modal-body { flex: 1; display: flex; align-items: center; justify-content: center; background: #111; overflow: hidden; }
        .modal-body img, .modal-body video { max-width: 100%; max-height: 100%; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .modal-body iframe { width: 100%; height: 100%; border: none; background: white; }
        .close-modal { font-size: 24px; cursor: pointer; color: var(--text-sub); }
        .close-modal:hover { color: #000; }

        /* Upload Progress Widget */
        #upload-widget { position: fixed; bottom: 20px; right: 20px; width: 320px; background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.25); display: none; z-index: 50000; border: 1px solid var(--border); }
        .widget-header { background: #323232; color: white; padding: 12px 16px; font-size: 14px; display: flex; justify-content: space-between; }
        .widget-body { padding: 16px; max-height: 200px; overflow-y: auto; }
        .p-bar-bg { height: 6px; background: #eee; border-radius: 3px; margin-top: 5px; }
        .p-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body onclick="hideContext()">

    <div id="preview-modal" onclick="closePreview()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span id="preview-title" style="font-weight:600;">File Preview</span>
                <i class="fa fa-times close-modal" onclick="closePreview()"></i>
            </div>
            <div class="modal-body" id="preview-body">
                </div>
        </div>
    </div>

    <div id="upload-widget">
        <div class="widget-header"><span>อัปโหลด</span><i class="fa fa-times" onclick="this.parentElement.parentElement.style.display='none'"></i></div>
        <div class="widget-body" id="upload-list"></div>
    </div>

    <aside class="sidebar">
        <h2 style="color:var(--primary);"><i class="fab fa-google-drive"></i> Drive Pro</h2>
        <button onclick="document.getElementById('f-upload').click()" style="background:white; border:1px solid var(--border); padding:14px; border-radius:28px; cursor:pointer; display:flex; align-items:center; gap:12px; margin-bottom:20px; font-weight:600;">
            <i class="fa fa-plus" style="color:var(--primary)"></i> อัปโหลด
        </button>
        <nav>
            <button class="nav-item active" onclick="loadDrive()"><i class="fa fa-hdd"></i> ไดรฟ์ของฉัน</button>
            <button class="nav-item" onclick="loadTrash()"><i class="fa fa-trash-alt"></i> ถังขยะ</button>
        </nav>
    </aside>

    <main class="main">
        <div class="grid" id="grid"></div>
    </main>

    <input type="file" id="f-upload" hidden multiple onchange="uploadWithProgress(this.files)">

    <script>
        const API_KEY = 'AIzaSyCokJR-ZdO0gUqurZbZfNTBmb12aOlXQHA';
        const CLIENT_ID = '914130530338-l7anrm3o0gp1rjekep18sm2pehhlsofp.apps.googleusercontent.com';
        let currentFolder = 'root', selectedItem = null;

        function initApp() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
                const t = localStorage.getItem('drive_token');
                if(t) { gapi.client.setToken({access_token:t}); loadDrive(); }
                else { /* logic to show login */ }
            });
        }

        async function loadDrive(fid = 'root') {
            const res = await gapi.client.drive.files.list({ q: `'${fid}' in parents and trashed = false`, fields: 'files(id, name, mimeType, thumbnailLink, iconLink, webViewLink, hasThumbnail)' });
            render(res.result.files || []);
        }

        function render(files) {
            const grid = document.getElementById('grid');
            grid.innerHTML = files.map(f => {
                const isF = f.mimeType === 'application/vnd.google-apps.folder';
                return `
                <div class="card" onclick="select(event, ${JSON.stringify(f).replace(/"/g, '&quot;')})" 
                     ondblclick="${isF ? `loadDrive('${f.id}')` : `openPreview(${JSON.stringify(f).replace(/"/g, '&quot;')})`}">
                    <div class="preview-thumb">
                        ${f.thumbnailLink ? `<img src="${f.thumbnailLink.replace('=s220','=s500')}">` : `<i class="fa ${isF?'fa-folder':'fa-file-alt'}" style="color:#cfd8dc; font-size:40px;"></i>`}
                    </div>
                    <div class="info"><img src="${f.iconLink}" width="16"> <span>${f.name}</span></div>
                </div>`;
            }).join('');
        }

        // --- NEW: QUICK PREVIEW SYSTEM ---
        function openPreview(item) {
            const modal = document.getElementById('preview-modal');
            const body = document.getElementById('preview-body');
            const title = document.getElementById('preview-title');
            
            title.innerText = item.name;
            body.innerHTML = ''; // Clear old content
            modal.style.display = 'flex';

            const type = item.mimeType;
            
            if (type.includes('image')) {
                // สำหรับรูปภาพ: ดึงภาพต้นฉบับผ่าน webViewLink (หรือ thumbnail ขนาดใหญ่)
                body.innerHTML = `<img src="${item.thumbnailLink.replace('=s220','=s1000')}" alt="Preview">`;
            } 
            else if (type.includes('video')) {
                // สำหรับวิดีโอ: ใช้ iframe embed ของ Google Drive เพื่อรองรับการสตรีม
                body.innerHTML = `<iframe src="https://drive.google.com/file/d/${item.id}/preview" allow="autoplay"></iframe>`;
            } 
            else if (type === 'application/pdf') {
                // สำหรับ PDF: เปิดใน iframe
                body.innerHTML = `<iframe src="https://drive.google.com/file/d/${item.id}/preview"></iframe>`;
            } 
            else {
                // สำหรับไฟล์อื่นๆ: แสดงปุ่มเปิดใน Google Drive
                body.innerHTML = `
                    <div style="color:white; text-align:center;">
                        <i class="fa fa-file-alt fa-5x" style="margin-bottom:20px;"></i>
                        <p>ไม่รองรับการแสดงผลตัวอย่างสำหรับไฟล์ประเภทนี้</p>
                        <button onclick="window.open('${item.webViewLink}')" style="padding:10px 20px; cursor:pointer;">เปิดใน Google Drive</button>
                    </div>`;
            }
        }

        function closePreview() {
            document.getElementById('preview-modal').style.display = 'none';
            document.getElementById('preview-body').innerHTML = ''; // Stop video/iframe
        }

        // --- Upload Logic (Reuse V.17) ---
        async function uploadWithProgress(files) {
            const widget = document.getElementById('upload-widget');
            const list = document.getElementById('upload-list');
            widget.style.display = 'block';

            for (let file of files) {
                const itemId = 'up-' + Math.random().toString(36).substr(2,9);
                list.insertAdjacentHTML('afterbegin', `<div class="upload-item" id="${itemId}"><span>${file.name}</span><div class="p-bar-bg"><div class="p-bar-fill"></div></div></div>`);
                
                const token = gapi.client.getToken().access_token;
                const fd = new FormData();
                fd.append('metadata', new Blob([JSON.stringify({name: file.name, parents:[currentFolder]})], {type:'application/json'}));
                fd.append('file', file);

                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
                xhr.setRequestHeader('Authorization', 'Bearer ' + token);
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const pct = Math.round((e.loaded/e.total)*100);
                        document.getElementById(itemId).querySelector('.p-bar-fill').style.width = pct+'%';
                    }
                };
                xhr.onload = () => { loadDrive(currentFolder); };
                xhr.send(fd);
            }
        }

        function select(e, item) { e.stopPropagation(); selectedItem = item; document.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); e.currentTarget.classList.add('selected'); }
        function hideContext() { /* menu logic */ }
        window.onload = initApp;
    </script>
</body>
</html>
