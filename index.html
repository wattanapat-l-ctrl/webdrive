<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Pro | Double Click Experience</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8; --bg: #ffffff; --side: #f8f9fa;
            --text: #3c4043; --border: #dadce0; --selected: rgba(26, 115, 232, 0.1);
        }
        [data-theme="dark"] {
            --bg: #121212; --side: #1e1e1e; --text: #e8eaed; --border: #3c4043; --selected: rgba(26, 115, 232, 0.2);
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { font-size: 20px; font-weight: bold; color: var(--primary); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        
        .nav-btn { 
            padding: 12px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; 
            gap: 12px; font-size: 14px; border: none; background: none; color: var(--text); width: 100%; transition: 0.2s; margin-bottom: 5px;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.05); }
        .nav-btn.active { background: #e8f0fe; color: var(--primary); font-weight: 600; }

        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .header { height: 64px; padding: 0 25px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        
        .search-bar { flex: 1; max-width: 500px; position: relative; }
        .search-bar input { width: 100%; padding: 10px 15px 10px 40px; border-radius: 8px; border: 1px solid var(--border); background: var(--side); outline: none; color: var(--text); }
        .search-bar i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }

        .grid { flex: 1; padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        /* File Card Styling */
        .file-card { 
            background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
            position: relative; transition: 0.15s; cursor: pointer; overflow: hidden;
            user-select: none; /* ป้องกันการคลุมดำตอนดับเบิลคลิก */
        }
        .file-card:hover { background: var(--side); border-color: var(--primary); }
        .file-card.active { background: var(--selected); border-color: var(--primary); }

        .card-actions {
            position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; opacity: 0; transition: 0.2s; z-index: 10;
        }
        .file-card:hover .card-actions { opacity: 1; }

        .mini-btn { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .btn-share { background: #34a853; }
        .btn-del { background: #ea4335; }

        .preview { height: 110px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.02); }
        .preview i { font-size: 45px; color: #cfd8dc; }
        .preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 10px; display: flex; align-items: center; gap: 8px; font-size: 13px; border-top: 1px solid var(--border); }
        .info span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .breadcrumb { padding: 10px 25px; font-size: 14px; color: var(--primary); background: var(--bg); border-bottom: 1px solid var(--border); }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 5px; display: none; z-index: 9999; }
    </style>
</head>
<body ondragover="e=>e.preventDefault()" ondrop="handleDrop(event)">

    <aside class="sidebar">
        <div class="logo"><i class="fab fa-google-drive"></i> Drive Pro</div>
        <button class="nav-btn active" onclick="goHome()"><i class="fa fa-hdd"></i> ไดรฟ์ของฉัน</button>
        <button class="nav-btn" onclick="filterType('image')"><i class="fa fa-image"></i> รูปภาพ</button>
        <button class="nav-btn" onclick="filterType('pdf')"><i class="fa fa-file-pdf"></i> PDF</button>
        <hr style="width:100%; border:0.5px solid var(--border); margin: 15px 0;">
        <button class="nav-btn" onclick="createFolder()" style="color:var(--primary)"><i class="fa fa-folder-plus"></i> สร้างโฟลเดอร์</button>
        <button class="nav-btn" onclick="document.getElementById('file-in').click()" style="color:var(--primary)"><i class="fa fa-cloud-upload-alt"></i> อัปโหลดไฟล์</button>
        <div style="margin-top:auto;">
            <button class="nav-btn" onclick="handleLogout()" style="color:#ea4335"><i class="fa fa-sign-out-alt"></i> ออกจากระบบ</button>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <div class="search-bar">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="ค้นหาไฟล์ (ดับเบิลคลิกเพื่อเปิด)..." oninput="debounceSearch(this.value)">
            </div>
            <div id="user-info" style="font-size: 12px; color: var(--text-sub);"></div>
        </header>
        <div class="breadcrumb" id="path-box">My Drive</div>
        <div class="grid" id="grid"></div>
    </main>

    <input type="file" id="file-in" hidden multiple onchange="handleFileInput(event)">
    <div id="toast" class="toast"></div>

    <script>
        const API_KEY = 'AIzaSyCokJR-ZdO0gUqurZbZfNTBmb12aOlXQHA';
        const CLIENT_ID = '914130530338-l7anrm3o0gp1rjekep18sm2pehhlsofp.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive';

        let currentFolder = 'root', path = [{id:'root', name:'My Drive'}];

        function initGapi() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
                const token = localStorage.getItem('drive_token');
                if (token) {
                    gapi.client.setToken({ access_token: token });
                    fetchFiles();
                } else { handleAuth(); }
            });
        }

        function handleAuth() {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES,
                callback: (resp) => { localStorage.setItem('drive_token', resp.access_token); location.reload(); }
            });
            client.requestAccessToken({prompt: 'consent'});
        }

        async function fetchFiles(fid = currentFolder, qStr = '') {
            currentFolder = fid;
            let q = `'${fid}' in parents and trashed = false`;
            if(qStr) q = `name contains '${qStr}' and trashed = false`;
            
            const res = await gapi.client.drive.files.list({ q, fields: 'files(id, name, mimeType, thumbnailLink, iconLink)' });
            render(res.result.files || []);
        }

        function render(files) {
            const g = document.getElementById('grid');
            g.innerHTML = files.map(f => {
                const isF = f.mimeType === 'application/vnd.google-apps.folder';
                return `
                <div class="file-card" 
                     onclick="selectCard(this)" 
                     ondblclick="${isF ? `enter('${f.id}','${f.name}')` : `openFile('${f.id}')`}">
                    <div class="card-actions">
                        <button class="mini-btn btn-share" title="Copy Link" onclick="event.stopPropagation(); share('${f.id}')"><i class="fa fa-link"></i></button>
                        <button class="mini-btn btn-del" title="Delete" onclick="event.stopPropagation(); del('${f.id}')"><i class="fa fa-trash"></i></button>
                    </div>
                    <div class="preview">
                        ${f.thumbnailLink && !isF ? `<img src="${f.thumbnailLink.replace('=s220','=s500')}">` : `<i class="${isF?'fa fa-folder':'fa fa-file-alt'}" style="${isF?'color:#fbc02d':''}"></i>`}
                    </div>
                    <div class="info"><img src="${f.iconLink}" width="16"><span>${f.name}</span></div>
                </div>`;
            }).join('');
            document.getElementById('path-box').innerHTML = path.map((p,i)=>`<span onclick="jump(${i})">${p.name}</span>`).join(' > ');
        }

        // --- NEW LOGIC FUNCTIONS ---
        function selectCard(el) {
            document.querySelectorAll('.file-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function openFile(id) { window.open(`https://drive.google.com/file/d/${id}/view`, '_blank'); }
        
        function enter(id, name) { path.push({id, name}); fetchFiles(id); }
        
        function jump(i) { path = path.slice(0, i+1); fetchFiles(path[i].id); }

        function goHome() { path = [{id:'root', name:'My Drive'}]; fetchFiles('root'); }

        async function createFolder() {
            const n = prompt("ชื่อโฟลเดอร์:");
            if(n) { await gapi.client.drive.files.create({ resource: { name:n, mimeType:'application/vnd.google-apps.folder', parents:[currentFolder] } }); fetchFiles(); }
        }

        async function del(id) { if(confirm("ย้ายไปที่ถังขยะ?")) { await gapi.client.drive.files.update({ fileId:id, resource:{trashed:true} }); fetchFiles(); } }

        function share(id) { 
            navigator.clipboard.writeText(`https://drive.google.com/file/d/${id}/view?usp=sharing`);
            showToast("คัดลอกลิงก์แล้ว");
        }

        let timer;
        function debounceSearch(v) { clearTimeout(timer); timer = setTimeout(() => fetchFiles(currentFolder, v), 500); }

        async function uploadBatch(files) {
            const token = gapi.client.getToken().access_token;
            for (let f of files) {
                showToast(`อัปโหลด ${f.name}...`);
                const meta = { name: f.name, parents: [currentFolder] };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                form.append('file', f);
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: form
                });
            }
            fetchFiles(); showToast("อัปโหลดสำเร็จ");
        }

        function handleFileInput(e) { uploadBatch(e.target.files); }
        function handleDrop(e) { e.preventDefault(); uploadBatch(e.dataTransfer.files); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
        function handleLogout() { localStorage.clear(); location.reload(); }

        window.onload = initGapi;
    </script>
</body>
</html>
