<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Cloud Pro</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer onload="initGapi()"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --g-blue: #1a73e8; --border: #dadce0; --bg: #ffffff; --text: #3c4043; --sidebar-bg: #f8f9fa; }
        [data-theme="dark"] { --bg: #1e1e1e; --text: #e8eaed; --border: #3c4043; --sidebar-bg: #2d2d2d; }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); transition: 0.3s; }
        
        /* Drop Zone */
        #dropZone { position: fixed; inset: 0; background: rgba(26,115,232,0.1); border: 4px dashed var(--g-blue); z-index: 10005; display: none; align-items: center; justify-content: center; pointer-events: none; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; }
        .btn-new { background: var(--g-blue); color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-weight: 500; }
        .nav-item { padding: 10px 15px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; margin-bottom: 4px; }
        .nav-item:hover { background: rgba(0,0,0,0.05); }
        .nav-item.active { background: #e8f0fe; color: var(--g-blue); font-weight: bold; }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 64px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 15px; }
        .search-bar { flex: 1; background: var(--sidebar-bg); border-radius: 8px; display: flex; align-items: center; padding: 8px 15px; }
        .search-bar input { border: none; background: transparent; width: 100%; outline: none; color: inherit; }

        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .grid.list-view { grid-template-columns: 1fr; }

        /* File Card */
        .card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; transition: 0.2s; background: var(--bg); }
        .card:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-preview { height: 120px; background: #f1f3f4; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-preview img { width: 100%; height: 100%; object-fit: cover; }
        .card-footer { padding: 10px; font-size: 13px; display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border); }
        
        .actions { display: none; position: absolute; top: 5px; right: 5px; background: white; border-radius: 5px; padding: 4px; gap: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card:hover .actions { display: flex; }
        .action-btn { border: none; background: none; padding: 5px; cursor: pointer; color: #555; }

        /* Modal Preview */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10001; display: none; align-items: center; justify-content: center; padding: 40px; }
        .modal-content { max-width: 90%; max-height: 90%; background: white; border-radius: 8px; overflow: hidden; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 20px; font-size: 30px; color: white; cursor: pointer; }

        .overlay { position: fixed; inset: 0; background: white; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 25px; border-radius: 20px; z-index: 10005; display: none; }
    </style>
</head>
<body ondragover="handleDrag(event, true)" ondragleave="handleDrag(event, false)" ondrop="handleDrop(event)">

    <div id="dropZone"><h2>วางที่นี่เพื่ออัปโหลด</h2></div>

    <div id="authScreen" class="overlay">
        <i class="fab fa-google-drive fa-5x" style="color:var(--g-blue); margin-bottom:20px;"></i>
        <h2>Unlimited Cloud Pro</h2>
        <button class="btn-new" onclick="handleAuth()">Login with Google</button>
    </div>

    <div class="sidebar">
        <div style="font-size: 20px; margin-bottom: 20px;"><i class="fab fa-google-drive"></i> My Drive</div>
        <button class="btn-new" onclick="document.getElementById('fileIn').click()"><i class="fa fa-plus"></i> New Upload</button>
        <div class="nav-item active" onclick="changeView('root', this)"><i class="fa fa-home"></i> My Drive</div>
        <div class="nav-item" onclick="changeView('image', this)"><i class="fa fa-image"></i> Images</div>
        <div class="nav-item" onclick="changeView('video', this)"><i class="fa fa-video"></i> Videos</div>
        <div class="nav-item" onclick="changeView('pdf', this)"><i class="fa fa-file-pdf"></i> PDF Documents</div>
        <div class="nav-item" onclick="changeView('trash', this)"><i class="fa fa-trash"></i> Trash Bin</div>
        <div style="margin-top:auto">
            <div class="nav-item" onclick="toggleTheme()"><i class="fa fa-moon"></i> Dark Mode</div>
            <div class="nav-item" onclick="handleSignout()"><i class="fa fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <div id="breadcrumb" style="flex:1">My Drive</div>
            <div class="search-bar"><i class="fa fa-search"></i><input type="text" id="search" placeholder="Search files..." oninput="doSearch()"></div>
            <button onclick="toggleViewMode()" style="background:none; border:none; cursor:pointer"><i class="fa fa-th-large"></i></button>
        </div>
        <div class="content" id="fileGrid" class="grid"></div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <div id="modalBody" class="modal-content" onclick="event.stopPropagation()"></div>
    </div>

    <input type="file" id="fileIn" style="display:none" onchange="uploadFile()">
    <div id="toast" class="toast"></div>

    <script>
        const API_KEY = 'AIzaSyCokJR-ZdO0gUqurZbZfNTBmb12aOlXQHA';
        const CLIENT_ID = '914130530338-l7anrm3o0gp1rjekep18sm2pehhlsofp.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive';
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

        let tokenClient;
        let masterFiles = [];
        let currentFilter = 'root';

        // 1. Session & API Setup
        function initGapi() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                checkSession();
            });
        }

        function checkSession() {
            const savedToken = localStorage.getItem('gdrive_token');
            if (savedToken) {
                gapi.client.setToken({ access_token: savedToken });
                document.getElementById('authScreen').style.display = 'none';
                renderFiles();
            }
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES,
                callback: (resp) => {
                    localStorage.setItem('gdrive_token', resp.access_token);
                    document.getElementById('authScreen').style.display = 'none';
                    renderFiles();
                }
            });
        }

        function handleAuth() { tokenClient.requestAccessToken({prompt: 'consent'}); }

        // 2. File Listing & Filtering
        async function renderFiles(filter = 'root') {
            currentFilter = filter;
            let query = "trashed = false";
            if (filter === 'trash') query = "trashed = true";
            else if (filter === 'image') query += " and mimeType contains 'image/'";
            else if (filter === 'video') query += " and mimeType contains 'video/'";
            else if (filter === 'pdf') query += " and mimeType = 'application/pdf'";

            const resp = await gapi.client.drive.files.list({
                pageSize: 100,
                fields: 'files(id, name, mimeType, thumbnailLink, webViewLink, iconLink)',
                q: query
            });
            masterFiles = resp.result.files;
            drawGrid(masterFiles);
        }

        function drawGrid(files) {
            const grid = document.getElementById('fileGrid');
            grid.className = 'grid ' + (localStorage.getItem('viewMode') || '');
            grid.innerHTML = files.map(f => `
                <div class="card" onclick="openPreview('${f.id}', '${f.mimeType}')">
                    <div class="actions">
                        <button class="action-btn" onclick="event.stopPropagation(); shareLink('${f.id}')"><i class="fa fa-share"></i></button>
                        <button class="action-btn" onclick="event.stopPropagation(); ${currentFilter==='trash'?'restoreFile':'deleteFile'}('${f.id}')">
                            <i class="fa fa-${currentFilter==='trash'?'undo':'trash'}"></i>
                        </button>
                    </div>
                    <div class="card-preview">
                        ${f.thumbnailLink ? `<img src="${f.thumbnailLink.replace('=s220','=s400')}">` : `<i class="fa fa-file-alt fa-3x"></i>`}
                    </div>
                    <div class="card-footer">
                        <img src="${f.iconLink}" width="16"> <span>${f.name}</span>
                    </div>
                </div>
            `).join('');
        }

        // 3. Actions (Share, Delete, Restore)
        function shareLink(id) {
            navigator.clipboard.writeText(`https://drive.google.com/file/d/${id}/view`);
            showToast("Copied share link!");
        }

        async function deleteFile(id) {
            await gapi.client.drive.files.update({ fileId: id, resource: { trashed: true } });
            renderFiles(currentFilter);
        }

        async function restoreFile(id) {
            await gapi.client.drive.files.update({ fileId: id, resource: { trashed: false } });
            renderFiles(currentFilter);
        }

        // 4. Drag & Drop & Upload
        function handleDrag(e, active) { e.preventDefault(); document.getElementById('dropZone').style.display = active ? 'flex' : 'none'; }
        async function handleDrop(e) {
            e.preventDefault(); handleDrag(e, false);
            for (let f of e.dataTransfer.files) await uploadProcess(f);
        }

        async function uploadFile() { await uploadProcess(document.getElementById('fileIn').files[0]); }

        async function uploadProcess(file) {
            showToast("Uploading " + file.name);
            const metadata = { name: file.name };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', file);
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + gapi.client.getToken().access_token },
                body: form
            });
            renderFiles(currentFilter);
            showToast("Upload Success!");
        }

        // 5. Preview System
        function openPreview(id, mime) {
            const body = document.getElementById('modalBody');
            document.getElementById('modal').style.display = 'flex';
            if(mime.includes('image')) {
                body.innerHTML = `<img src="https://drive.google.com/thumbnail?id=${id}&sz=w1000" style="width:100%">`;
            } else {
                body.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" width="800" height="600" frameborder="0"></iframe>`;
            }
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // 6. Extras
        function toggleTheme() {
            const theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
            document.body.dataset.theme = theme;
            localStorage.setItem('theme', theme);
        }
        function changeView(filter, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            renderFiles(filter);
        }
        function toggleViewMode() {
            const mode = localStorage.getItem('viewMode') === 'list-view' ? '' : 'list-view';
            localStorage.setItem('viewMode', mode);
            drawGrid(masterFiles);
        }
        function handleSignout() {
            localStorage.clear();
            location.reload();
        }
        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
        function doSearch() {
            const val = document.getElementById('search').value.toLowerCase();
            drawGrid(masterFiles.filter(f => f.name.toLowerCase().includes(val)));
        }

        // Auto-run
        if(localStorage.getItem('theme') === 'dark') document.body.dataset.theme = 'dark';
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="initGapi()"></script>
</body>
</html>
