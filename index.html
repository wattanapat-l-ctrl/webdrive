<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Pro | Advanced Actions</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8; --bg: #ffffff; --sidebar: #f8f9fa;
            --text: #3c4043; --border: #e0e0e0; --danger: #d93025; --success: #1e8e3e;
        }
        [data-theme="dark"] {
            --bg: #1e1e1e; --sidebar: #2d2d2d; --text: #e8eaed; --border: #3c4043;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { 
            padding: 12px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; 
            gap: 12px; font-size: 14px; border: none; background: none; color: var(--text); width: 100%; margin-bottom: 5px;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.05); }
        .nav-btn.active { background: #e8f0fe; color: var(--primary); font-weight: 600; }

        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .top-nav { height: 64px; padding: 0 25px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .breadcrumb { font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 10px; }

        /* File Grid & Cards */
        .content { flex: 1; padding: 25px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .file-card { 
            background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
            position: relative; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: default; overflow: hidden;
        }
        .file-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--primary); }

        /* Action Buttons Overlay */
        .card-actions {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9); display: flex; align-items: center;
            justify-content: center; gap: 10px; opacity: 0; transition: 0.2s; z-index: 10;
        }
        [data-theme="dark"] .card-actions { background: rgba(30, 30, 30, 0.9); }
        .file-card:hover .card-actions { opacity: 1; }

        .circle-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; color: white; transition: 0.2s;
        }
        .btn-view { background: var(--primary); }
        .btn-share { background: var(--success); }
        .btn-delete { background: var(--danger); }
        .circle-btn:hover { transform: scale(1.15); filter: brightness(1.1); }

        /* Content inside Card */
        .card-preview { height: 140px; background: #f1f3f4; display: flex; align-items: center; justify-content: center; }
        .card-preview img { width: 100%; height: 100%; object-fit: cover; }
        .card-preview i { font-size: 50px; color: #bdc1c6; }
        .card-footer { padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); }
        .card-footer span { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Modals & Toasts */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 25px; border-radius: 50px; font-size: 14px; display: none; z-index: 100; }
        .loading { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body ondragover="handleDrag(event, true)" ondragleave="handleDrag(event, false)" ondrop="handleDrop(event)">

    <div id="loading" class="loading">
        <div id="auth-box" style="display:none; text-align:center;">
            <i class="fab fa-google-drive fa-4x" style="color:var(--primary)"></i>
            <h2>Drive Pro Login</h2>
            <button class="nav-btn active" onclick="handleAuth()" style="width:auto; padding: 10px 40px; margin: 0 auto;">Login with Google</button>
        </div>
        <div id="loader"><i class="fas fa-spinner fa-spin fa-3x" style="color:var(--primary)"></i></div>
    </div>

    <aside class="sidebar">
        <h2 style="color: var(--primary); font-size: 22px;"><i class="fab fa-google-drive"></i> Drive Pro</h2>
        <button class="nav-btn active" onclick="goHome()"><i class="fa fa-hdd"></i> ไดรฟ์ของฉัน</button>
        <button class="nav-btn" onclick="filterType('image')"><i class="fa fa-image"></i> รูปภาพ</button>
        <button class="nav-btn" onclick="filterType('pdf')"><i class="fa fa-file-pdf"></i> เอกสาร PDF</button>
        <hr style="width:100%; border:0.5px solid var(--border); margin: 20px 0;">
        <button class="nav-btn" onclick="toggleTheme()"><i class="fa fa-moon"></i> สลับโหมดสี</button>
        <button class="nav-btn" onclick="handleLogout()" style="color:var(--danger)"><i class="fa fa-sign-out-alt"></i> ออกจากระบบ</button>
    </aside>

    <main class="main">
        <header class="top-nav">
            <div class="breadcrumb" id="breadcrumb">ไดรฟ์ของฉัน</div>
            <button class="nav-btn active" style="width:auto; background:var(--primary); color:white;" onclick="document.getElementById('file-in').click()">
                <i class="fa fa-plus"></i> อัปโหลดไฟล์
            </button>
        </header>

        <div class="content" id="file-grid">
            </div>
    </main>

    <input type="file" id="file-in" hidden multiple onchange="handleFileInput(event)">
    <div id="toast" class="toast"></div>

    <script>
        const API_KEY = 'AIzaSyCokJR-ZdO0gUqurZbZfNTBmb12aOlXQHA';
        const CLIENT_ID = '914130530338-l7anrm3o0gp1rjekep18sm2pehhlsofp.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive';

        let tokenClient, currentFolderId = 'root', path = [{id:'root', name:'ไดรฟ์ของฉัน'}];

        function initGapi() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
                checkSession();
            });
        }

        function checkSession() {
            const saved = localStorage.getItem('drive_token');
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES,
                callback: (resp) => {
                    localStorage.setItem('drive_token', resp.access_token);
                    document.getElementById('loading').style.display = 'none';
                    fetchFiles();
                }
            });

            if (saved) {
                gapi.client.setToken({ access_token: saved });
                gapi.client.drive.about.get({fields:'user'}).then(() => {
                    document.getElementById('loading').style.display = 'none';
                    fetchFiles();
                }).catch(() => showAuthUI());
            } else {
                showAuthUI();
            }
        }

        function showAuthUI() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('auth-box').style.display = 'block';
        }

        function handleAuth() { tokenClient.requestAccessToken({prompt: 'consent'}); }
        function handleLogout() { localStorage.clear(); location.reload(); }

        // --- FETCH & RENDER ---
        async function fetchFiles(folderId = currentFolderId) {
            currentFolderId = folderId;
            let q = `'${folderId}' in parents and 'me' in owners and trashed = false`;
            try {
                const resp = await gapi.client.drive.files.list({
                    pageSize: 100, q: q,
                    fields: 'files(id, name, mimeType, thumbnailLink, iconLink)',
                    orderBy: 'folder, name'
                });
                render(resp.result.files || []);
            } catch (e) { showToast("ไม่สามารถดึงข้อมูลได้"); }
        }

        function render(files) {
            const grid = document.getElementById('file-grid');
            grid.innerHTML = files.map(f => {
                const isFolder = f.mimeType === 'application/vnd.google-apps.folder';
                return `
                <div class="file-card">
                    <div class="card-actions">
                        <button class="circle-btn btn-view" title="ดูไฟล์" onclick="${isFolder ? `enterFolder('${f.id}', '${f.name}')` : `openFile('${f.id}')`}"><i class="fa ${isFolder ? 'fa-folder-open' : 'fa-eye'}"></i></button>
                        <button class="circle-btn btn-share" title="คัดลอกลิงก์แชร์" onclick="shareFile('${f.id}')"><i class="fa fa-share-alt"></i></button>
                        <button class="circle-btn btn-delete" title="ลบไฟล์" onclick="deleteFile('${f.id}')"><i class="fa fa-trash"></i></button>
                    </div>
                    <div class="card-preview">
                        ${f.thumbnailLink && !isFolder ? `<img src="${f.thumbnailLink.replace('=s220','=s500')}">` : `<i class="${isFolder ? 'fa fa-folder' : 'fa fa-file-alt'}"></i>`}
                    </div>
                    <div class="card-footer">
                        <img src="${f.iconLink}" width="16">
                        <span>${f.name}</span>
                    </div>
                </div>`;
            }).join('');
            updateBreadcrumb();
        }

        // --- ACTIONS ---
        function openFile(id) { window.open(`https://drive.google.com/file/d/${id}/view`, '_blank'); }

        function shareFile(id) {
            const link = `https://drive.google.com/file/d/${id}/view?usp=sharing`;
            navigator.clipboard.writeText(link);
            showToast("คัดลอกลิงก์แชร์แล้ว!");
        }

        async function deleteFile(id) {
            if(!confirm("ต้องการย้ายไฟล์นี้ไปที่ถังขยะใช่หรือไม่?")) return;
            try {
                await gapi.client.drive.files.update({ fileId: id, resource: { trashed: true } });
                showToast("ลบไฟล์เรียบร้อยแล้ว");
                fetchFiles();
            } catch (e) { showToast("เกิดข้อผิดพลาดในการลบ"); }
        }

        // --- NAVIGATION ---
        function enterFolder(id, name) { path.push({id, name}); fetchFiles(id); }
        function goHome() { path = [{id:'root', name:'ไดรฟ์ของฉัน'}]; fetchFiles('root'); }
        function updateBreadcrumb() {
            document.getElementById('breadcrumb').innerHTML = path.map((p, i) => 
                `<span style="cursor:pointer; color:${i===path.length-1?'var(--text)':'var(--primary)'}" onclick="jumpTo(${i})">${p.name}</span>`).join(' <i class="fa fa-chevron-right" style="font-size:10px; color:#ccc;"></i> ');
        }
        function jumpTo(i) { path = path.slice(0, i+1); fetchFiles(path[i].id); }

        // --- UTILS ---
        function handleDrag(e, act) { e.preventDefault(); }
        async function handleDrop(e) { e.preventDefault(); uploadBatch(e.dataTransfer.files); }
        function handleFileInput(e) { uploadBatch(e.target.files); }

        async function uploadBatch(files) {
            for(let f of files) {
                showToast(`กำลังอัปโหลด ${f.name}...`);
                const meta = { name: f.name, parents: [currentFolderId] };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                form.append('file', f);
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + gapi.client.getToken().access_token },
                    body: form
                });
            }
            showToast("อัปโหลดเสร็จสิ้น");
            fetchFiles();
        }

        function toggleTheme() {
            const t = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
            document.body.dataset.theme = t;
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        window.onload = initGapi;
    </script>
</body>
</html>
