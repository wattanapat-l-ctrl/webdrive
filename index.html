<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Pro | Cloud Storage</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer onload="initGapi()"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8; --bg-main: #ffffff; --bg-side: #f8f9fa;
            --text-main: #3c4043; --text-sub: #5f6368; --border: #dadce0;
            --shadow: rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] {
            --bg-main: #121212; --bg-side: #1e1e1e; --text-main: #e8eaed;
            --text-sub: #bdc1c6; --border: #3c4043; --shadow: rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background 0.2s, color 0.2s; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg-main); color: var(--text-main); overflow: hidden; }

        /* Sidebar & Storage Meter */
        .sidebar { width: 280px; background: var(--bg-side); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; }
        .nav-link { 
            padding: 12px 16px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; 
            gap: 14px; font-size: 14px; color: var(--text-sub); margin-bottom: 4px; border: none; background: none; width: 100%; text-align: left;
        }
        .nav-link:hover { background: rgba(0,0,0,0.04); color: var(--primary); }
        .nav-link.active { background: #e8f0fe; color: var(--primary); font-weight: 600; }
        
        .storage-card {
            background: var(--bg-main); border: 1px solid var(--border); border-radius: 16px; 
            padding: 16px; margin-top: auto; box-shadow: 0 4px 12px var(--shadow);
        }
        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 1s ease-in-out; }

        /* Main Content */
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-bar { 
            height: 72px; padding: 0 24px; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; gap: 20px;
        }
        .search-container { 
            flex: 1; max-width: 600px; background: var(--bg-side); border-radius: 12px;
            display: flex; align-items: center; padding: 0 16px; border: 1px solid transparent;
        }
        .search-container:focus-within { border-color: var(--primary); background: var(--bg-main); box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
        .search-container input { border: none; background: none; padding: 12px; width: 100%; outline: none; color: var(--text-main); }

        .file-content { flex: 1; padding: 24px; overflow-y: auto; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; }
        
        /* File Cards */
        .file-card { 
            background: var(--bg-main); border: 1px solid var(--border); border-radius: 14px;
            overflow: hidden; cursor: pointer; position: relative; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .file-card:hover { border-color: var(--primary); box-shadow: 0 8px 20px var(--shadow); }
        .file-thumb { height: 130px; background: #f1f3f4; display: flex; align-items: center; justify-content: center; position: relative; }
        .file-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .file-info { padding: 12px; display: flex; align-items: center; gap: 10px; font-size: 13px; border-top: 1px solid var(--border); }
        .file-info span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Floating Upload Button */
        .fab-upload {
            position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white;
            width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(26,115,232,0.4); cursor: pointer; transition: 0.3s; z-index: 100;
        }
        .fab-upload:hover { transform: scale(1.1); rotate: 90deg; }

        /* Modals & Overlays */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box { background: var(--bg-main); border-radius: 24px; width: 100%; max-width: 900px; max-height: 90vh; overflow: hidden; position: relative; }
        
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #323232; color: white; padding: 12px 24px; border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2); display: none; z-index: 2000;
        }
        
        #drop-overlay {
            position: fixed; inset: 0; background: rgba(26,115,232,0.1); border: 4px dashed var(--primary);
            z-index: 1500; display: none; align-items: center; justify-content: center; pointer-events: none;
        }
    </style>
</head>
<body ondragover="toggleDrop(event, true)" ondragleave="toggleDrop(event, false)" ondrop="handleDrop(event)">

    <div id="drop-overlay"><h2><i class="fa fa-cloud-arrow-up"></i> Release to Upload</h2></div>

    <div id="auth-screen" class="modal" style="display: flex; background: var(--bg-main);">
        <div style="text-align: center;">
            <div style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"><i class="fab fa-google-drive"></i></div>
            <h1 style="margin: 0 0 10px;">Drive Pro</h1>
            <p style="color: var(--text-sub); margin-bottom: 30px;">Unlimited Storage Solutions</p>
            <button class="nav-link active" onclick="handleAuth()" style="justify-content: center; width: 200px; margin: 0 auto;">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
        </div>
    </div>

    <aside class="sidebar">
        <div style="font-weight: 600; font-size: 22px; padding: 10px 0 30px; color: var(--primary);">
            <i class="fab fa-google-drive"></i> Drive Pro
        </div>
        
        <button class="nav-link active" data-filter="root" onclick="changeFilter('root', this)"><i class="fa fa-hdd"></i> My Drive</button>
        <button class="nav-link" data-filter="image" onclick="changeFilter('image', this)"><i class="fa fa-image"></i> Images</button>
        <button class="nav-link" data-filter="video" onclick="changeFilter('video', this)"><i class="fa fa-play-circle"></i> Videos</button>
        <button class="nav-link" data-filter="pdf" onclick="changeFilter('pdf', this)"><i class="fa fa-file-pdf"></i> PDF Files</button>
        <button class="nav-link" data-filter="trash" onclick="changeFilter('trash', this)"><i class="fa fa-trash"></i> Trash</button>
        
        <div class="storage-card">
            <div style="font-size: 13px; font-weight: 500;">Storage Used</div>
            <div class="progress-bar"><div id="quota-fill" class="progress-fill"></div></div>
            <div id="quota-text" style="font-size: 12px; color: var(--text-sub);">0 GB of Unlimited</div>
        </div>
        
        <button class="nav-link" style="margin-top: 10px;" onclick="toggleTheme()"><i class="fa fa-circle-half-stroke"></i> Appearance</button>
        <button class="nav-link" onclick="handleLogout()"><i class="fa fa-right-from-bracket"></i> Sign out</button>
    </aside>

    <main class="main-container">
        <header class="top-bar">
            <div class="search-container">
                <i class="fa fa-search" style="color: var(--text-sub);"></i>
                <input type="text" id="search-input" placeholder="Search in your drive..." oninput="handleSearch()">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="nav-link" onclick="fetchFiles()" style="width: auto;"><i class="fa fa-sync"></i></button>
            </div>
        </header>

        <section class="file-content" id="grid-container">
            <div id="file-grid" class="file-grid">
                </div>
        </section>

        <div class="fab-upload" onclick="document.getElementById('hidden-input').click()" title="Upload File">
            <i class="fa fa-plus fa-xl"></i>
        </div>
    </aside>

    <div id="preview-modal" class="modal" onclick="closePreview()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div id="preview-body" style="height: 80vh; display: flex; align-items: center; justify-content: center;"></div>
        </div>
    </div>

    <input type="file" id="hidden-input" multiple style="display:none" onchange="handleFileInput(event)">
    <div id="toast" class="toast"></div>

    <script>
        const API_KEY = 'AIzaSyCokJR-ZdO0gUqurZbZfNTBmb12aOlXQHA';
        const CLIENT_ID = '914130530338-l7anrm3o0gp1rjekep18sm2pehhlsofp.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive';
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

        let tokenClient, masterFiles = [], currentFilter = 'root';

        // --- Core Authentication ---
        function initGapi() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                const savedToken = localStorage.getItem('drive_session');
                if (savedToken) {
                    gapi.client.setToken({ access_token: savedToken });
                    document.getElementById('auth-screen').style.display = 'none';
                    fetchFiles();
                }
            });
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES,
                callback: (resp) => {
                    localStorage.setItem('drive_session', resp.access_token);
                    document.getElementById('auth-screen').style.display = 'none';
                    fetchFiles();
                }
            });
        }

        function handleAuth() { tokenClient.requestAccessToken({prompt: 'consent'}); }
        function handleLogout() { localStorage.clear(); location.reload(); }

        // --- File Operations ---
        async function fetchFiles() {
            let query = "trashed = false";
            if(currentFilter === 'trash') query = "trashed = true";
            else if(currentFilter === 'image') query += " and mimeType contains 'image/'";
            else if(currentFilter === 'video') query += " and mimeType contains 'video/'";
            else if(currentFilter === 'pdf') query += " and mimeType = 'application/pdf'";

            try {
                const resp = await gapi.client.drive.files.list({
                    pageSize: 50, q: query,
                    fields: 'files(id, name, mimeType, thumbnailLink, webViewLink, iconLink, size)'
                });
                masterFiles = resp.result.files;
                renderGrid(masterFiles);
                updateStorageInfo();
            } catch (err) { showToast("Error connecting to Drive"); }
        }

        function renderGrid(files) {
            const grid = document.getElementById('file-grid');
            if(!files.length) { grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--text-sub);">No files found here.</div>`; return; }
            
            grid.innerHTML = files.map(f => `
                <div class="file-card" onclick="openPreview('${f.id}', '${f.mimeType}')">
                    <div class="file-thumb">
                        ${f.thumbnailLink ? `<img src="${f.thumbnailLink.replace('=s220','=s500')}">` : `<i class="${getIcon(f.mimeType)} fa-3x" style="color:#bdc1c6"></i>`}
                        <div style="position:absolute; top:8px; right:8px; display:flex; gap:5px;">
                            <button onclick="event.stopPropagation(); deleteFile('${f.id}')" style="border:none; background:white; border-radius:50%; width:30px; height:30px; cursor:pointer; color:red; box-shadow:0 2px 5px rgba(0,0,0,0.1);"><i class="fa fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="file-info">
                        <img src="${f.iconLink}" width="16">
                        <span>${f.name}</span>
                    </div>
                </div>
            `).join('');
        }

        async function deleteFile(id) {
            if(!confirm("Move to trash?")) return;
            await gapi.client.drive.files.update({ fileId: id, resource: { trashed: true } });
            showToast("File trashed");
            fetchFiles();
        }

        // --- Upload Logic ---
        function toggleDrop(e, active) { e.preventDefault(); document.getElementById('drop-overlay').style.display = active ? 'flex' : 'none'; }
        async function handleDrop(e) { e.preventDefault(); toggleDrop(e, false); handleFiles(e.dataTransfer.files); }
        function handleFileInput(e) { handleFiles(e.target.files); }

        async function handleFiles(files) {
            for(let file of files) {
                showToast(`Uploading ${file.name}...`);
                const metadata = { name: file.name };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + gapi.client.getToken().access_token },
                    body: form
                });
            }
            showToast("Upload complete!");
            fetchFiles();
        }

        // --- UX Features ---
        function openPreview(id, mime) {
            const modal = document.getElementById('preview-modal');
            const body = document.getElementById('preview-body');
            modal.style.display = 'flex';
            if(mime.includes('image')) body.innerHTML = `<img src="https://drive.google.com/thumbnail?id=${id}&sz=w1200" style="max-width:100%; max-height:80vh; border-radius:12px;">`;
            else body.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" width="100%" height="100%" style="border:none;"></iframe>`;
        }
        function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

        function changeFilter(type, el) {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            currentFilter = type;
            fetchFiles();
        }

        function handleSearch() {
            const term = document.getElementById('search-input').value.toLowerCase();
            renderGrid(masterFiles.filter(f => f.name.toLowerCase().includes(term)));
        }

        async function updateStorageInfo() {
            const resp = await gapi.client.drive.about.get({ fields: 'storageQuota' });
            const used = resp.result.storageQuota.usage;
            const usedGB = (used / (1024**3)).toFixed(2);
            document.getElementById('quota-fill').style.width = Math.min((usedGB / 10) * 100, 100) + '%';
            document.getElementById('quota-text').innerText = `${usedGB} GB used`;
        }

        function toggleTheme() {
            const theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
            document.body.dataset.theme = theme;
            localStorage.setItem('drive_theme', theme);
        }

        function getIcon(mime) {
            if(mime.includes('image')) return 'fa fa-image';
            if(mime.includes('video')) return 'fa fa-play-circle';
            if(mime.includes('pdf')) return 'fa fa-file-pdf';
            return 'fa fa-file';
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // Initial setup
        if(localStorage.getItem('drive_theme') === 'dark') document.body.dataset.theme = 'dark';
    </script>
</body>
</html>
